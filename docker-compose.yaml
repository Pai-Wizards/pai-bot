services:
  discord-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: discord-bot
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${HTTP_SERVER_PORT}:${HTTP_SERVER_PORT}"
    volumes:
      - ./config:/app/config
    environment:
      - TZ=America/Sao_Paulo
    networks:
      - app-network
    command: python __main__.py

networks:
  app-network:
    external: true
